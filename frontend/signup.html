<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Feel With Food</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-page" style="padding-top: 40px; padding-bottom: 40px; align-items: flex-start;">
        <div class="auth-container" style="max-width: 600px;">
            <div class="auth-card glass-card">
                <div class="auth-header">
                    <a href="/" class="logo-link">
                        <div class="logo-icon">🔥</div>
                        <span>Feel With Food</span>
                    </a>
                    <h1>Create your account</h1>
                    <p>Join India's most innovative fitness platform today.</p>
                </div>

                <form id="signup-form">
                    <!-- Step 1: Basic Info -->
                    <div id="step-1">
                        <div class="form-group">
                            <label class="form-label" for="name">Full Name</label>
                            <input type="text" id="name" class="form-input" placeholder="Arjun Sharma" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="email">Email Address</label>
                            <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="phone">Phone Number (Optional)</label>
                            <input type="tel" id="phone" class="form-input" placeholder="+1234567890">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="password">Password</label>
                            <input type="password" id="password" class="form-input" placeholder="At least 6 characters" required minlength="6">
                            <div class="password-strength">
                                <div id="strength-bar" class="strength-bar"></div>
                            </div>
                        </div>

                        <button type="button" class="btn btn-primary" style="width: 100%; margin-top: 10px;" id="next-btn">
                            Next Step →
                        </button>
                    </div>

                    <!-- Step 2: Body Metrics -->
                    <div id="step-2" style="display: none;">
                        <button type="button" class="btn btn-ghost mb-3" id="back-btn" style="padding: 0; color: var(--accent-cyan);">
                            ← Back
                        </button>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="age">Age</label>
                                <input type="number" id="age" class="form-input" placeholder="e.g. 25" min="12" max="100" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="gender">Gender</label>
                                <select id="gender" class="form-select" required>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="height">Height (cm)</label>
                                <input type="number" id="height" class="form-input" placeholder="e.g. 175" min="100" max="250" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="weight">Weight (kg)</label>
                                <input type="number" id="weight" class="form-input" placeholder="e.g. 70" min="30" max="300" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="activity_level">Activity Level</label>
                            <select id="activity_level" class="form-select" required>
                                <option value="sedentary">Sedentary (Little or no exercise)</option>
                                <option value="light">Light (Exercise 1-3 days/week)</option>
                                <option value="moderate" selected>Moderate (Exercise 3-5 days/week)</option>
                                <option value="active">Active (Exercise 6-7 days/week)</option>
                                <option value="very_active">Very Active (Hard exercise daily)</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="goal">Fitness Goal</label>
                            <select id="goal" class="form-select" required>
                                <option value="lose">Lose Weight</option>
                                <option value="maintain" selected>Maintain Weight</option>
                                <option value="gain">Build Muscle / Gain Weight</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;" id="signup-btn">
                            Create Account
                        </button>
                    </div>
                </form>

                <div class="auth-footer">
                    <p>Already have an account? <a href="/login">Log in</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="js/app.js"></script>
    <script>
        // Redirect if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard';
        }

        const step1 = document.getElementById('step-1');
        const step2 = document.getElementById('step-2');
        const nextBtn = document.getElementById('next-btn');
        const backBtn = document.getElementById('back-btn');
        const pwdInput = document.getElementById('password');
        const strengthBar = document.getElementById('strength-bar');

        // Password strength meter
        pwdInput.addEventListener('input', (e) => {
            const val = e.target.value;
            strengthBar.className = 'strength-bar'; // reset
            
            if (val.length === 0) return;
            
            if (val.length < 6) {
                strengthBar.classList.add('strength-weak');
            } else if (val.length < 8) {
                strengthBar.classList.add('strength-fair');
            } else if (val.match(/[A-Z]/) && val.match(/[0-9]/)) {
                strengthBar.classList.add('strength-strong');
            } else {
                strengthBar.classList.add('strength-good');
            }
        });

        // Next Step validation
        nextBtn.addEventListener('click', () => {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const pwd = pwdInput.value;

            if (!name || !email || !pwd) {
                app.showToast('Please fill all fields', 'error');
                return;
            }

            if (pwd.length < 6) {
                app.showToast('Password must be at least 6 characters', 'error');
                return;
            }

            // Basic email validation
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                app.showToast('Please enter a valid email address', 'error');
                return;
            }

            step1.style.display = 'none';
            step2.style.display = 'block';
        });

        // Back button
        backBtn.addEventListener('click', () => {
            step2.style.display = 'none';
            step1.style.display = 'block';
        });

        // Final Submit
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('signup-btn');
            btn.innerHTML = '<div class="spinner" style="width: 20px; height: 20px; border-width: 2px;"></div>';
            btn.disabled = true;

            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: pwdInput.value,
                age: parseInt(document.getElementById('age').value),
                gender: document.getElementById('gender').value,
                height: parseFloat(document.getElementById('height').value),
                weight: parseFloat(document.getElementById('weight').value),
                activity_level: document.getElementById('activity_level').value,
                goal: document.getElementById('goal').value
            };

            try {
                const response = await fetch('https://feelwithfood.onrender.com/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/dashboard';
                } else {
                    app.showToast(data.error || 'Signup failed', 'error');
                    btn.innerHTML = 'Create Account';
                    btn.disabled = false;
                }
            } catch (err) {
                app.showToast('Network error. Please try again.', 'error');
                btn.innerHTML = 'Create Account';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
