<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Feel With Food</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card glass-card">
                <div class="auth-header">
                    <a href="/" class="logo-link">
                        <div class="logo-icon">🔥</div>
                        <span>Feel With Food</span>
                    </a>
                    <h1>Reset Password</h1>
                    <p>Enter your new password below.</p>
                </div>

                <form id="reset-form">
                    <div class="form-group">
                        <label class="form-label" for="new-password">New Password</label>
                        <input type="password" id="new-password" class="form-input" placeholder="••••••••" required minlength="6">
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;" id="reset-btn">
                        Update Password
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Extract token from URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const newPassword = document.getElementById('new-password').value;
            const btn = document.getElementById('reset-btn');
            
            if (!token) {
                app.showToast('Invalid or missing reset token.', 'error');
                return;
            }

            btn.innerHTML = '<div class="spinner" style="width: 20px; height: 20px; border-width: 2px;"></div>';
            btn.disabled = true;

            try {
                const response = await fetch('https://feelwithfood.onrender.com/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    app.showToast('Password updated! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    app.showToast(data.message || 'Failed to reset password', 'error');
                    btn.innerHTML = 'Update Password';
                    btn.disabled = false;
                }
            } catch (err) {
                app.showToast('Network error. Please try again.', 'error');
                btn.innerHTML = 'Update Password';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
